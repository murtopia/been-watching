<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Been Watching</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #FFFFFF;
            --surface: rgba(255, 255, 255, 0.7);
            --glass: rgba(255, 255, 255, 0.6);
            --border: rgba(0, 0, 0, 0.08);
            --accent-primary: #007AFF;
            --accent-pink: #FF2D55;
            --accent-purple: #AF52DE;
            --text-primary: #000000;
            --text-secondary: #6B6B75;
            --text-tertiary: #8E8E93;
            --love: #FF2D55;
            --like: #007AFF;
            --meh: #8E8E93;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #000000;
                --surface: rgba(255, 255, 255, 0.1);
                --glass: rgba(255, 255, 255, 0.08);
                --border: rgba(255, 255, 255, 0.12);
                --text-primary: #FFFFFF;
                --text-secondary: #8E8E93;
                --text-tertiary: #6B6B75;
            }
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding-bottom: 90px;
            position: relative;
        }

        .nav-header {
            position: sticky;
            top: 0;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .nav-content {
            max-width: 600px;
            margin: 0 auto;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-weight: 700;
            font-size: 1.25rem;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 1rem;
        }

        .trending-section {
            margin-bottom: 2rem;
        }

        .section-title {
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .shows-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }

        .show-card {
            cursor: pointer;
            transition: transform 0.2s;
        }

        .show-card:hover {
            transform: scale(1.05);
        }

        .show-poster {
            width: 100%;
            aspect-ratio: 2/3;
            border-radius: 12px;
            object-fit: cover;
            background: var(--surface);
            margin-bottom: 0.5rem;
        }

        .show-title {
            font-size: 0.875rem;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .activity-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 1rem;
            transition: all 0.2s;
        }

        .activity-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 1rem 0.5rem;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            flex-shrink: 0;
        }

        .user-info {
            flex: 1;
        }

        .search-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 1rem;
            animation: fadeIn 0.2s;
            overflow-y: auto;
        }

        .search-modal.active {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 3rem;
        }

        .search-content {
            background: var(--bg-primary);
            border-radius: 24px;
            width: 100%;
            max-width: 600px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            animation: slideUp 0.3s;
        }

        .search-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-shrink: 0;
        }

        .search-input-wrapper {
            flex: 1;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            color: var(--text-primary);
        }

        .close-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--surface);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .search-type-toggle {
            display: flex;
            gap: 0.5rem;
            padding: 0 1.5rem 1rem;
        }

        .type-btn {
            padding: 0.5rem 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.875rem;
        }

        .type-btn.active {
            background: var(--accent-primary);
            color: white;
            border-color: var(--accent-primary);
        }

        .search-results {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 1.5rem;
            min-height: 0;
        }

        .no-results {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
        }

        .tab-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 0.5rem;
            display: flex;
            gap: 0.5rem;
            z-index: 99;
        }

        .tab-item, .tab-add {
            padding: 0.75rem 1.5rem;
            background: transparent;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-add {
            width: 44px;
            height: 44px;
            padding: 0;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            color: white;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tab-item.active {
            background: var(--accent-primary);
            color: white;
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #34C759;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s;
            z-index: 2000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .my-shows-section, .profile-section {
            display: none;
            max-width: 600px;
            margin: 0 auto;
            padding: 1rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <nav class="nav-header">
        <div class="nav-content">
            <div class="logo">Been Watching</div>
            <button style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">✨</button>
        </div>
    </nav>

    <div class="main-container" id="mainContainer">
        <div class="trending-section">
            <h2 class="section-title">Trending This Week</h2>
            <div id="trendingShows" class="shows-grid">
                <!-- Trending shows will be loaded here -->
            </div>
        </div>

        <div id="feedContent">
            <!-- Activity feed will be loaded here -->
        </div>
    </div>

    <div class="my-shows-section" id="myShowsSection">
        <h1 style="text-align: center; margin-bottom: 2rem;">My Shows</h1>
        <div style="text-align: center; color: var(--text-secondary); padding: 3rem;">
            Your saved shows will appear here
        </div>
    </div>

    <div class="profile-section" id="profileSection">
        <h1 style="text-align: center; margin-bottom: 2rem;">Profile</h1>
        <div style="text-align: center;">
            <div class="user-avatar" style="width: 80px; height: 80px; margin: 0 auto 1rem; font-size: 1.5rem;">YOU</div>
            <h2>@username</h2>
            <p style="color: var(--text-secondary); margin-top: 0.5rem;">What have you been watching?</p>
        </div>
    </div>

    <div class="search-modal" id="searchModal">
        <div class="search-content">
            <div class="search-header">
                <div class="search-input-wrapper">
                    <span style="position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%);">🔍</span>
                    <input type="text" class="search-input" id="searchInput" placeholder="Search shows or movies...">
                </div>
                <button class="close-btn" id="closeSearchBtn">✕</button>
            </div>
            
            <div class="search-type-toggle">
                <button class="type-btn active" data-type="all">All</button>
                <button class="type-btn" data-type="tv">TV Shows</button>
                <button class="type-btn" data-type="movie">Movies</button>
            </div>
            
            <div class="search-results" id="searchResults">
                <div class="no-results">
                    <h3 style="font-size: 2rem; margin-bottom: 0.5rem;">🔍</h3>
                    <p>Search for your favorite shows and movies</p>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <nav class="tab-bar">
        <button class="tab-item active" data-section="feed">🏠 Feed</button>
        <button class="tab-add" id="addBtn">+</button>
        <button class="tab-item" data-section="myshows">📚 My Shows</button>
        <button class="tab-item" data-section="profile">👤 Profile</button>
    </nav>

    <script>
    (function() {
        'use strict';
        
        // Initialize the app
        const API_KEY = '99b89037cac7fea56692934b534ea26a';
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMAGE_BASE = 'https://image.tmdb.org/t/p';
        
        // Load sample data
        function initApp() {
            loadTrendingShows();
            loadActivityFeed();
            setupEventListeners();
        }
        
        function loadTrendingShows() {
            const container = document.getElementById('trendingShows');
            const shows = [
                { title: 'The Bear', poster: '🎬' },
                { title: 'Fallout', poster: '🎬' },
                { title: 'Shogun', poster: '🎬' },
                { title: 'The Last of Us', poster: '🎬' },
                { title: 'Wednesday', poster: '🎬' },
                { title: 'Succession', poster: '🎬' }
            ];
            
            container.innerHTML = shows.map(show => `
                <div class="show-card">
                    <div class="show-poster" style="display: flex; align-items: center; justify-content: center; font-size: 3rem; background: var(--surface);">
                        ${show.poster}
                    </div>
                    <div class="show-title">${show.title}</div>
                </div>
            `).join('');
        }
        
        function loadActivityFeed() {
            const container = document.getElementById('feedContent');
            const activities = [
                { user: 'Sarah Chen', initials: 'SC', action: 'loved', show: 'The Bear', time: '2 hours ago' },
                { user: 'Mike Rodriguez', initials: 'MR', action: 'started watching', show: 'Fallout', time: '5 hours ago' },
                { user: 'Emma Wilson', initials: 'EW', action: 'finished', show: 'Shogun', time: '1 day ago' }
            ];
            
            container.innerHTML = activities.map(activity => `
                <div class="activity-card">
                    <div class="activity-header">
                        <div class="user-avatar">${activity.initials}</div>
                        <div class="user-info">
                            <div><strong>${activity.user}</strong> ${activity.action} <strong>${activity.show}</strong></div>
                            <div style="font-size: 0.75rem; color: var(--text-secondary);">${activity.time}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function setupEventListeners() {
            // Tab navigation
            document.querySelectorAll('.tab-item').forEach(tab => {
                tab.addEventListener('click', function() {
                    const section = this.dataset.section;
                    
                    // Hide all sections
                    document.getElementById('mainContainer').style.display = 'none';
                    document.getElementById('myShowsSection').style.display = 'none';
                    document.getElementById('profileSection').style.display = 'none';
                    
                    // Remove active class
                    document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    
                    // Show selected section
                    switch(section) {
                        case 'feed':
                            document.getElementById('mainContainer').style.display = 'block';
                            break;
                        case 'myshows':
                            document.getElementById('myShowsSection').style.display = 'block';
                            break;
                        case 'profile':
                            document.getElementById('profileSection').style.display = 'block';
                            break;
                    }
                });
            });
            
            // Add button
            document.getElementById('addBtn').addEventListener('click', function() {
                document.getElementById('searchModal').classList.add('active');
            });
            
            // Close search
            document.getElementById('closeSearchBtn').addEventListener('click', function() {
                document.getElementById('searchModal').classList.remove('active');
            });
            
            // Search type toggle
            document.querySelectorAll('.type-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                });
            });
        }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        // Initialize when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }
    })();
    </script>
</body>
</html>
